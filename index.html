<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Target Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("https://i.ibb.co/7QpKsCX/shiv.jpg") no-repeat center/cover;
  color:white;
  text-align:center;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
}
.box{
  background:linear-gradient(gold,#b8860b);
  color:black;
  padding:8px 15px;
  border-radius:10px;
  box-shadow:0 0 10px gold;
}

/* WHEEL AREA */
.wheel-wrapper{
  position:relative;
  width:300px;
  margin:20px auto;
}

/* POINTER */
.pointer{
  width:0;height:0;
  border-left:18px solid transparent;
  border-right:18px solid transparent;
  border-bottom:30px solid red;
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  z-index:2;
}

/* WHEEL IMAGE */
#wheel{
  width:300px;
  transition:transform 4s cubic-bezier(.17,.67,.83,.67);
  filter:drop-shadow(0 0 20px gold);
}

/* COINS */
.coins{
  width:220px;
  margin-top:-60px;
}

/* BUTTONS */
.buttons{
  margin-top:10px;
}
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:20px;
  background:red;
  color:white;
  font-size:16px;
}

/* NUMBERS */
.numbers{
  margin-top:15px;
}
.num{
  display:inline-block;
  width:45px;
  height:45px;
  line-height:45px;
  border-radius:50%;
  margin:5px;
  background:orange;
  box-shadow:0 0 10px gold;
}

#timer{
  color:yellow;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="top">
  <div class="box">Score: 1839</div>
  <div class="box">Time: <span id="timer">60</span></div>
  <div class="box">Winner: 0</div>
</div>

<div class="wheel-wrapper">
  <div class="pointer"></div>

  <!-- WHEEL PNG -->
  <img id="wheel" src="https://i.ibb.co/6bQJY0P/wheel.png">

  <!-- COINS -->
  <img class="coins" src="https://i.ibb.co/0jQ0Zxq/coins.png">
</div>

<div class="buttons">
  <button onclick="startGame()">Start</button>
  <button>Cancel Bet</button>
  <button>Bet OK</button>
</div>

<div class="numbers">
  <div class="num">1</div>
  <div class="num">2</div>
  <div class="num">3</div>
  <div class="num">4</div>
  <div class="num">5</div>
  <div class="num">6</div>
  <div class="num">7</div>
  <div class="num">8</div>
  <div class="num">9</div>
  <div class="num">0</div>
</div>

<script>

let resultNumber = 6; // 👉 yaha result control karega

function startGame(){
  let time = 60;

  let t = setInterval(()=>{
    document.getElementById("timer").innerText = time;
    time--;

    if(time < 0){
      clearInterval(t);
      spinWheel(resultNumber);
    }
  },1000);
}

function spinWheel(num){
  let wheel = document.getElementById("wheel");

  let anglePerNumber = 360 / 10;

  // pointer top pe hai → adjust
  let finalAngle = (360 * 6) + (anglePerNumber * num);

  wheel.style.transform = "rotate(" + finalAngle + "deg)";
}

</script>

</body>
</html>
