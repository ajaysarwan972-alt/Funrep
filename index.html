<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel Game</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* GAME */
.game{
  position:relative;
  width:90%;
  max-width:400px;
}

/* BG */
.bg{
  width:100%;
}

/* WHEEL */
#wheel{
  position:absolute;
  top:35%;
  left:50%;
  transform:translate(-50%,-50%);
  width:45%;
  transition:transform 4s ease-out;
}

/* POINTER */
.pointer{
  position:absolute;
  top:22%;
  left:50%;
  transform:translateX(-50%);
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:25px solid red;
}

/* TIMER */
.timer{
  position:absolute;
  top:5%;
  left:50%;
  transform:translateX(-50%);
  color:yellow;
  font-size:20px;
  font-weight:bold;
}

button{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 30px;
  font-size:18px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="game">

  <!-- WORKING BG -->
  <img class="bg" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Roulette_wheel.png/512px-Roulette_wheel.png">

  <!-- TIMER -->
  <div class="timer">Time: <span id="timer">60</span></div>

  <!-- POINTER -->
  <div class="pointer"></div>

  <!-- WORKING WHEEL -->
  <img id="wheel" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Roulette_wheel.png/512px-Roulette_wheel.png">

</div>

<button onclick="startGame()">Start</button>

<script>
let resultNumber = 5;

function startGame(){
  let time = 60;

  let t = setInterval(()=>{
    document.getElementById("timer").innerText = time;
    time--;

    if(time < 0){
      clearInterval(t);
      spinWheel(resultNumber);
    }
  },1000);
}

function spinWheel(num){
  let wheel = document.getElementById("wheel");
  let angle = (360 * 6) + (36 * num);
  wheel.style.transform = "translate(-50%,-50%) rotate(" + angle + "deg)";
}
</script>

</body>
</html>
