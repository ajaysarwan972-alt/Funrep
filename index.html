<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel Game</title>

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* MAIN GAME BOX */
.game{
  position:relative;
  width:100%;
  max-width:500px;
}

/* BACKGROUND IMAGE */
.bg{
  width:100%;
  height:auto;
}

/* WHEEL */
#wheel{
  position:absolute;
  top:32%;
  left:50%;
  transform:translate(-50%, -50%);
  width:40%;
  transition:transform 4s ease-out;
}

/* POINTER */
.pointer{
  position:absolute;
  top:18%;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:25px solid red;
}

/* TIMER */
.timer{
  position:absolute;
  top:5%;
  left:50%;
  transform:translateX(-50%);
  color:yellow;
  font-size:18px;
  font-weight:bold;
}

/* BUTTON */
button{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 25px;
  font-size:18px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="game">

  <!-- FULL DESIGN IMAGE -->
  <img class="bg" src="YOUR_FULL_IMAGE_LINK">

  <!-- TIMER -->
  <div class="timer">Time: <span id="timer">60</span></div>

  <!-- POINTER -->
  <div class="pointer"></div>

  <!-- WHEEL PNG -->
  <img id="wheel" src="YOUR_WHEEL_IMAGE_LINK">

</div>

<button onclick="startGame()">Start</button>

<script>

let resultNumber = 5;

function startGame(){
  let time = 60;

  let t = setInterval(()=>{
    document.getElementById("timer").innerText = time;
    time--;

    if(time < 0){
      clearInterval(t);
      spinWheel(resultNumber);
    }
  },1000);
}

function spinWheel(num){
  let wheel = document.getElementById("wheel");

  let angle = (360 * 6) + (36 * num);

  wheel.style.transform = "translate(-50%, -50%) rotate(" + angle + "deg)";
}

</script>

</body>
</html>
