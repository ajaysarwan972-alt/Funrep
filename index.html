<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Style Game</title>

<style>
body{
  margin:0;
  background:black;
  text-align:center;
  font-family:Arial;
}

/* MAIN BOX */
.game{
  position:relative;
  width:360px;
  margin:auto;
}

/* FULL BACKGROUND (tera screenshot jaisa) */
.bg{
  width:100%;
}

/* WHEEL (upar ghumega) */
#wheel{
  position:absolute;
  top:115px;   /* adjust if needed */
  left:50%;
  transform:translateX(-50%);
  width:200px;
  transition:transform 4s ease-out;
}

/* POINTER */
.pointer{
  position:absolute;
  top:95px;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:25px solid red;
}

/* TIMER */
.timer{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:yellow;
  font-size:18px;
  font-weight:bold;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 20px;
  font-size:18px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="game">

  <!-- FULL DESIGN IMAGE -->
  <img class="bg" src="https://i.imgur.com/your-full-image.png">

  <!-- TIMER -->
  <div class="timer">Time: <span id="timer">60</span></div>

  <!-- POINTER -->
  <div class="pointer"></div>

  <!-- CUT WHEEL PNG -->
  <img id="wheel" src="https://i.imgur.com/your-wheel.png">

</div>

<button onclick="startGame()">Start</button>

<script>

let resultNumber = 5;

function startGame(){
  let time = 60;

  let t = setInterval(()=>{
    document.getElementById("timer").innerText = time;
    time--;

    if(time < 0){
      clearInterval(t);
      spinWheel(resultNumber);
    }
  },1000);
}

function spinWheel(num){
  let wheel = document.getElementById("wheel");

  let angle = (360 * 6) + (36 * num);

  wheel.style.transform = "translateX(-50%) rotate(" + angle + "deg)";
}

</script>

</body>
</html>
