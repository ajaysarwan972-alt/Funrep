<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle,#3b2b00,#000);
  color:white;
  text-align:center;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-around;
  padding:10px;
}
.box{
  background:linear-gradient(gold,#b8860b);
  color:black;
  padding:8px 15px;
  border-radius:15px;
  box-shadow:0 0 10px gold;
}

/* WHEEL AREA */
.wheel-wrapper{
  position:relative;
  width:280px;
  margin:20px auto;
}

/* POINTER */
.pointer{
  width:0;height:0;
  border-left:18px solid transparent;
  border-right:18px solid transparent;
  border-bottom:30px solid red;
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  z-index:2;
}

/* WHEEL */
#wheel{
  width:100%;
  border-radius:50%;
  transition:transform 4s ease-out;
  box-shadow:0 0 25px gold;
}

/* COINS */
.coins{
  width:180px;
  margin-top:-50px;
}

/* BUTTONS */
.buttons{
  margin-top:10px;
}
button{
  padding:10px 18px;
  margin:5px;
  border:none;
  border-radius:20px;
  background:red;
  color:white;
  font-size:16px;
  box-shadow:0 0 10px red;
}

/* NUMBERS */
.numbers{
  margin-top:15px;
}
.num{
  display:inline-block;
  width:45px;
  height:45px;
  line-height:45px;
  border-radius:50%;
  margin:5px;
  background:orange;
  box-shadow:0 0 10px gold;
}

#timer{
  color:yellow;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="top">
  <div class="box">Score: 1839</div>
  <div class="box">Time: <span id="timer">60</span></div>
  <div class="box">Winner: 0</div>
</div>

<div class="wheel-wrapper">
  <div class="pointer"></div>

  <!-- WORKING WHEEL IMAGE -->
  <img id="wheel" src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Roulette_wheel.png">

  <!-- WORKING COINS -->
  <img class="coins" src="https://pngimg.com/uploads/coins/coins_PNG36871.png">
</div>

<div class="buttons">
  <button onclick="startGame()">Start</button>
  <button>Cancel Bet</button>
  <button>Bet OK</button>
</div>

<div class="numbers">
  <div class="num">1</div>
  <div class="num">2</div>
  <div class="num">3</div>
  <div class="num">4</div>
  <div class="num">5</div>
  <div class="num">6</div>
  <div class="num">7</div>
  <div class="num">8</div>
  <div class="num">9</div>
  <div class="num">0</div>
</div>

<script>
let resultNumber = 6;

function startGame(){
  let time = 60;

  let t = setInterval(()=>{
    document.getElementById("timer").innerText = time;
    time--;

    if(time < 0){
      clearInterval(t);
      spinWheel(resultNumber);
    }
  },1000);
}

function spinWheel(num){
  let wheel = document.getElementById("wheel");

  let anglePerNumber = 360 / 10;

  let finalAngle = (360 * 6) + (anglePerNumber * num);

  wheel.style.transform = "rotate(" + finalAngle + "deg)";
}
</script>

</body>
</html>
